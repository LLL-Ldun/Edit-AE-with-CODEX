<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>AEcreate Codex Bridge</title>
  <link rel="stylesheet" href="./css/panel.css">
</head>
<body>
  <main class="panel">
    <header class="panel-header">
      <div class="app-title" data-i18n="appTitle">AEcreate Codex Bridge</div>
      <label class="language-control">
        <span data-i18n="languageLabel">界面语言</span>
        <select id="languageSelect">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </label>
    </header>

    <section class="section">
      <div class="section-title" data-i18n="contextTitle">上下文</div>
      <label class="gpu-mode-control">
        <span data-i18n="gpuModeLabel">GPU 模式</span>
        <select id="gpuMode">
          <option value="integratedSafe" data-i18n="gpuModeIntegratedSafe">集显/安全</option>
          <option value="discretePerformance" data-i18n="gpuModeDiscretePerformance">独显/性能</option>
        </select>
      </label>
      <div id="contextStatus" class="status" data-i18n="noContextExported">尚未导出上下文。</div>
      <div class="button-row">
        <button id="refreshContext" data-i18n="refreshContext">刷新上下文</button>
        <button id="chooseBridge" data-i18n="chooseBridge">选择桥接目录</button>
      </div>
      <button id="openBridge" class="full" data-i18n="openBridge">打开桥接目录</button>
    </section>

    <section class="section">
      <div class="section-title" data-i18n="markersTitle">标记</div>
      <label class="marker-target-control">
        <span data-i18n="markerTargetLabel">标记目标</span>
        <select id="markerTarget">
          <option value="layer" data-i18n="markerTargetLayer">选中图层</option>
          <option value="comp" data-i18n="markerTargetComp">当前合成</option>
        </select>
      </label>
      <div class="button-grid">
        <button data-marker="kill_icon" data-i18n="markerKill">击杀</button>
        <button data-marker="impact" data-i18n="markerImpact">冲击</button>
        <button data-marker="rewind" data-i18n="markerRewind">回溯</button>
        <button id="customMarker" data-i18n="markerCustom">自定义</button>
      </div>
      <pre id="markerList" class="box" data-i18n="noMarkersLoaded">暂无标记。</pre>
    </section>

    <section class="section">
      <div class="section-title" data-i18n="libraryTitle">预设库</div>
      <div class="button-row">
        <button id="scanPresets" data-i18n="scanPresets">扫描预设</button>
        <button id="addPresetPath" data-i18n="addPresetPath">添加预设路径</button>
      </div>
      <button id="clearPresetPaths" class="full" data-i18n="clearPresetPaths">清空自定义路径</button>
      <pre id="presetPathList" class="box" data-i18n="noCustomPresetPaths">暂无自定义预设路径。默认会扫描 Documents/Adobe/After Effects、APPDATA 和 AE 安装 Presets。</pre>
      <pre id="presetStatus" class="box" data-i18n="presetNotScanned">尚未扫描预设缓存。</pre>
    </section>

    <section class="section">
      <div class="section-title" data-i18n="effectParamsTitle">插件参数库</div>
      <div class="effect-search">
        <input id="effectScanQuery" class="text-input" type="text" value="" placeholder="tc Particular / Deep Glow / CC Particle World">
        <div id="effectSuggestionList" class="effect-suggestion-list"></div>
      </div>
      <div class="button-row">
        <button id="scanEffectParams" data-i18n="scanEffectParams">扫描此插件</button>
        <button id="scanAllEffectParams" data-i18n="scanAllEffectParams">扫描全部插件</button>
      </div>
      <div class="plugin-status-toolbar">
        <select id="effectScanFilter">
          <option value="all" data-i18n="effectFilterAll">全部插件</option>
          <option value="unscanned" data-i18n="effectFilterUnscanned">未扫描</option>
          <option value="scanned" data-i18n="effectFilterScanned">已扫描</option>
          <option value="failed" data-i18n="effectFilterFailed">上次失败</option>
          <option value="workflow-known" data-i18n="effectFilterWorkflowKnown">已入库</option>
          <option value="workflow-unknown" data-i18n="effectFilterWorkflowUnknown">未入库</option>
        </select>
        <button id="refreshEffectStatus" data-i18n="refreshEffectStatus">刷新名单</button>
        <button id="selectUnscannedEffects" data-i18n="selectUnscannedEffects">勾选未扫描</button>
        <button id="scanSelectedEffects" data-i18n="scanSelectedEffects">扫描勾选插件</button>
      </div>
      <div id="effectStatusList" class="effect-status-list" data-i18n="effectStatusNotLoaded">尚未加载插件扫描名单。</div>
      <pre id="effectScanStatus" class="box" data-i18n="effectParamsNotScanned">尚未扫描插件参数树。</pre>
    </section>

    <section class="section">
      <div class="section-heading">
        <div class="section-title" data-i18n="pendingTitle">待应用方案</div>
        <button id="refreshPending" class="compact" data-i18n="refreshPending">刷新方案</button>
      </div>
      <div class="pending-layout">
        <div class="pending-current">
          <div id="pendingSummary" class="status" data-i18n="noPendingAction">暂无待应用动作。</div>
          <div id="moduleList" class="module-list"></div>
          <div class="button-row">
            <button id="applyChecked" data-i18n="applyChecked">应用勾选</button>
            <button id="discardPending" data-i18n="discardPending">丢弃</button>
          </div>
          <div class="button-row">
            <button id="saveFavorite" data-i18n="saveFavorite">收藏方案</button>
            <button id="openLogs" data-i18n="openLogs">打开日志</button>
          </div>
        </div>
        <aside class="pending-archive">
          <div class="archive-heading" data-i18n="pendingArchiveTitle">历史方案</div>
          <div id="pendingArchiveList" class="archive-list" data-i18n="noPendingArchive">暂无历史方案。</div>
        </aside>
      </div>
    </section>
  </main>

  <script src="./js/lib/CSInterface.js"></script>
  <script src="./js/bridge-client.js"></script>
  <script src="./js/panel-i18n.js"></script>
  <script src="./js/panel.js"></script>
</body>
</html>
